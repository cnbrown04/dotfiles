# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g mouse on
# Toggle mouse if it ever gets in the way
bind-key -T prefix -N "toggle mouse" M set -g mouse \; display-message "mouse: #{?mouse,on,off}"
set -g base-index 1
setw -g pane-base-index 1
set -g focus-events on

# Prefix is Ctrl-b, then the command key (e.g. g → lazygit below).
set -g prefix C-b

# Floating lazygit over the session; cwd follows the active pane (lazygit finds .git from there).
# Chord: Ctrl-b, then g.
bind-key -T prefix -N "lazygit (popup, repo from pane cwd)" g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E lazygit

# Ayu Mirage-ish palette for status + borders
set -g @thm_bg "#1F2430"
set -g @thm_blue "#5CCFE6"
set -g @thm_green "#BAE67E"
set -g @thm_red "#F28779"
set -g @thm_yellow "#FFD173"
set -g @thm_overlay_0 "#707A8C"
set -g @thm_overlay_1 "#9099AA"
set -g @thm_rosewater "#CBCCC6"
set -g @thm_surface_0 "#2A2F3A"

# Pane divider (border) colors
set -g pane-border-style "fg=#{@thm_overlay_0},bg=default"
set -g pane-active-border-style "fg=#{@thm_overlay_0},bg=default"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 250
set -g status-right ""
# Add right-side status segments here (git, battery, time, online status, etc.)
# Example:
# set -ga status-right "#[fg=#{@thm_overlay_0}] %Y-%m-%d %H:%M #[default]"

# Configure Tmux status
set -g status-position bottom
set -g status-style "bg=default,fg=#{@thm_rosewater}"
set -g status-justify "absolute-centre"

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=default,fg=#{@thm_overlay_1}"

set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

# tmux plugin manager (TPM) bootstrap (no plugins yet)
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # keep this line last

