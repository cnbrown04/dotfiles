session_name: eagle-platform
start_directory: "~/Developer/Work/eagle-platform"

windows:
  - window_name: dev
    layout: d301,317x81,0,0[317x61,0,0{244x61,0,0,92,72x61,245,0,96},317x19,0,62{158x19,0,62,93,158x19,159,62,94}]
    panes:
      # --- TOP ROW ---
      - shell_command: nvim .        # Large top-left
        focus: true
      - shell_command: agent       # Narrow top-right

      # --- BOTTOM ROW ---
      - shell_command: "zsh -lc 'bunx concurrently -c \"cyan,magenta,yellow\" -n \"eagle,core,caddy\" \"cd apps/eagle-service && bun run dev\" \"cd apps/core-service && bun run dev --port 3002\" \"caddy run --config ./Caddyfile.local\"'"  # Bottom-left
      - shell_command: "zsh -lc 'cd apps/eagle-backend && go run ./cmd/'"       # Bottom-right
